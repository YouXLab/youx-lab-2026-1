<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix redesign - João Manoel</title>
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <img src="back.png" class="back">

    <img src="banner.png" class="banner">
    <header class="topHeader">
        <img class="logo" src="logo.png">
        <select class="language">
            <option>Portugues</option>
            <option>Ingles</option>
        </select>
        <button>Entrar</button>
    </header>
    <div class="elementoTextos">
    <h1 class="title">Filmes, séries e muito mais, sem limites</h1>
    <h5 class="subtitle">A partir de R$ 20,90. Cancele quando quiser.</h5>
    <h5 class="subtitle">Quer assistir? Informe seu email para criar ou reiniciar sua assinatura.</h5>
    </div>
    <form action="#">
        <input type="text" placeholder="Email">
        <button type="submit">Vamos lá <i class="bx bxs-chevron-right"></i></button>
    </form>
    <div class="elementoLine">
    <div class="line">
        <div></div>
    </div>
    </div>
    <div class="about">
        <div class="adora">
            <img src="popcorn.png">
            <span><strong>Netflix que você adora por apenas R$ 20,90.</strong> <b></b>Aproveite nossa opção mais acessível, o plano com anúncios.</span>
        </div>
    </div>
</body>
</html>
